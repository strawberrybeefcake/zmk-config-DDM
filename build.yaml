# This file generates the GitHub Actions matrix
# For simple board + shield combinations, add them
# to the top level board and shield arrays, for more
# control, add individual board + shield combinations to
# the `include` property, e.g:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#
---
include:
  # Other boards disabled to keep CI fast. Re-enable as needed.
  #- board: planck@6.0.0//zmk
  #- board: corneish_zen_left@2.0.0//zmk
  #- board: corneish_zen_right@2.0.0//zmk
  #- board: glove80_lh
  #- board: glove80_rh

  # OLED Corne (set 1)
  - board: nice_nano@2
    shield: corne_left
    #snippet: zmk-usb-logging         # Re-enable to debug central via USB serial
    #cmake-args: -DCONFIG_ZMK_STUDIO=y
  - board: nice_nano@2
    shield: corne_right

  # Nice!View Corne (set 2) — same keymap, different display hardware
  - board: nice_nano@2
    shield: corne_left nice_view_adapter nice_view
  - board: nice_nano@2
    shield: corne_right nice_view_adapter nice_view

  - board: nice_nano@2
    shield: settings_reset
