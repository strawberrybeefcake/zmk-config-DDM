# Display
#CONFIG_ZMK_DISPLAY=y
#CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y

# Deep Sleep after 15min of inactivity
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Bluetooth: explicit enable since CONFIG_ZMK_USB=y otherwise defaults BLE off,
# which prevents the BT subsystem from initializing on the central and breaks
# inter-half split BLE.
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Logging
# CONFIG_ZMK_USB_LOGGING=y  # Don't set globally — breaks corne_right (peripheral has no USB).
                            # If needed, put in a corne_left.conf to scope to central only.
CONFIG_ZMK_USB=y

# Save config to flash more frequently
# Default is 60s and this lowers it to 10
# Only use this setting for debugging.
# Prolonged use can lead to flash chip degradation
# CONFIG_ZMK_SETTINGS_SAVE_DEBOUNCE 10000
