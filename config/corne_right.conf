# Peripheral-only settings. Auto-merged by Zephyr only when -DSHIELD=corne_right.
#
# Shows just battery percentage and connection-to-central status — no
# layer/output widgets since those are central-side concerns.
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
CONFIG_ZMK_WIDGET_PERIPHERAL_STATUS=y
