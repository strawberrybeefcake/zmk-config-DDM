# User-level config for the corne_nv_glue shield. Loaded by Zephyr
# *after* corne_left.conf and corne_right.conf (which sit at the same
# level in this directory), so =n here can override =y from those.
#
# This file is only loaded when corne_nv_glue is in the shield list, i.e.
# only for Nice!View builds. Plain corne_left / corne_right (OLED) builds
# don't see this file, so their standard widgets remain enabled.
#
# Disable the standard ZMK widgets so Nice!View's own custom widgets
# (boards/shields/nice_view/widgets/) can compile in without producing
# "multiple definition of widget_*_mutex" linker conflicts.
#
# Nice!View's Kconfig.defconfig defaults ZMK_DISPLAY_STATUS_SCREEN to
# CUSTOM, which implies NICE_VIEW_WIDGET_STATUS=y. We let that flow and
# just suppress the standard widgets here.
CONFIG_ZMK_WIDGET_LAYER_STATUS=n
CONFIG_ZMK_WIDGET_BATTERY_STATUS=n
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=n
CONFIG_ZMK_WIDGET_PERIPHERAL_STATUS=n
