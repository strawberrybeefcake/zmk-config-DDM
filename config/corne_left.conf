# Central-only settings. Auto-merged by Zephyr only when -DSHIELD=corne_left.
# These would all warn (silently ignored) on the peripheral build:
#   ZMK_USB                    - requires ZMK_SPLIT_ROLE_CENTRAL=y
#   ZMK_BLE                    - host BLE link; peripheral uses ZMK_SPLIT_BLE
#   ZMK_BLE_EXPERIMENTAL_CONN  - tunes host BLE conn params (depends on ZMK_BLE)
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# OLED display (central-only — peripheral has no display rendering by default).
# The upstream corne shield's overlay already declares the SSD1306 I2C node,
# so just enabling ZMK_DISPLAY is enough.
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
