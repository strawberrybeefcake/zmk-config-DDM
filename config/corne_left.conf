# Central-only settings. Auto-merged by Zephyr only when -DSHIELD=corne_left.
#
# Only the OLED display is configured here. The ZMK_USB / ZMK_BLE /
# ZMK_BLE_EXPERIMENTAL_CONN settings live in corne.conf for now even though
# they're functionally central-only — moving them coincided with a regression
# we never fully root-caused, so leave them in place.

# OLED display + standard ZMK widgets. The corne shield's Kconfig.defconfig
# auto-enables I2C and the SSD1306 driver when ZMK_DISPLAY=y, so no extra
# device-side config is required.
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
