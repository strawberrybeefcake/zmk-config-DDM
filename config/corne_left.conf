# Per-shield config: applies only when building corne_left (the central).
# Zephyr auto-merges <shield>.conf files in this directory based on -DSHIELD.

# USB logging on the central. Plug left half via USB after flashing,
# open serial at 115200 to read boot/BLE logs (peripheral connection
# events, BT addresses, etc.).
CONFIG_ZMK_USB_LOGGING=y
