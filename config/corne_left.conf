# Central-only settings. Auto-merged by Zephyr only when -DSHIELD=corne_left
# (or any shield combination starting with corne_left, e.g. with nice_view).
# These would all warn (silently ignored) on the peripheral build:
#   ZMK_USB                    - requires ZMK_SPLIT_ROLE_CENTRAL=y
#   ZMK_BLE                    - host BLE link; peripheral uses ZMK_SPLIT_BLE
#   ZMK_BLE_EXPERIMENTAL_CONN  - tunes host BLE conn params (depends on ZMK_BLE)
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Display + widgets. The corne shield's Kconfig.defconfig auto-enables I2C +
# SSD1306 when ZMK_DISPLAY=y, so the OLED hardware needs no extra config.
# Nice!View variant uses the same Kconfig (the shield combo handles the
# driver swap via nice_view_adapter + nice_view shields).
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
