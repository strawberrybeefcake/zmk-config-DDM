# Loaded only for Nice!View builds (shield combo includes corne_nv_glue).
#
# Disable the standard ZMK widgets that corne_{left,right}.conf enable.
# Without these overrides the standard widgets and Nice!View's own custom
# widgets BOTH end up linked in, producing the "multiple definition of
# widget_*_mutex" linker errors we saw initially.
#
# By turning off the standard widgets here, only Nice!View's custom ones
# are built — and they're sized and styled for the 160x68 SHARP LCD,
# which is what we want visually.
#
# These overrides only affect the Nice!View shield combo. Plain
# corne_left / corne_right (the OLED builds) don't load this file, so
# their standard widgets remain enabled and render normally on the
# 128x32 OLED.
#
# Nice!View's Kconfig.defconfig defaults ZMK_DISPLAY_STATUS_SCREEN to
# CUSTOM, which implies NICE_VIEW_WIDGET_STATUS=y, which compiles in the
# custom widgets (status.c on central, peripheral_status.c+art.c on
# peripheral). We let those defaults flow and just suppress the
# standard ZMK widgets here.
CONFIG_ZMK_WIDGET_LAYER_STATUS=n
CONFIG_ZMK_WIDGET_BATTERY_STATUS=n
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=n
CONFIG_ZMK_WIDGET_PERIPHERAL_STATUS=n
