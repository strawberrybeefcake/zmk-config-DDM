# Loaded only for Nice!View builds (shield combo includes corne_nv_glue).
#
# Without these overrides, Nice!View's Kconfig.defconfig selects
# ZMK_DISPLAY_STATUS_SCREEN_CUSTOM by default and implies
# NICE_VIEW_WIDGET_STATUS=y. That compiles in Nice!View's custom widgets
# (peripheral_status.c, battery_status.c). Our corne_{left,right}.conf
# already enable ZMK's standard versions of those widgets, so both end
# up linked into the same firmware and the linker fails with multiple
# definitions of widget_*_mutex / widget_*_work / zmk_listener_*.
#
# Switching to the built-in status screen (per nice_view/README.md)
# disables the custom widgets and lets the standard ZMK widgets render
# on the Nice!View. Standard widgets are sized for 128x32 OLEDs and
# will look small on the 160x68 Nice!View, but it's a working baseline
# we can iterate on.
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y
CONFIG_ZMK_LV_FONT_DEFAULT_SMALL_MONTSERRAT_26=y
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_26=y
